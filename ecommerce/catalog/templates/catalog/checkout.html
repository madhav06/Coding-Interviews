{% extends 'catalog/main.html' %}
{% load static %}
{%  block content %}
<div class="row"> 
    <div class="col-lg-6">
        <div class="box-element" id="form-wrapper"> 
            <form id="form">
                <div id="user-info">
                    <div class="form-field">
                        <input required class="form-control" type="text" name="name" placeholder="Name..">
                    </div>
                    <div class="form-field">
                        <input required class="form-control" type="text" name="name" placeholder="Email..">
                    </div>

                </div>
                <div id="shipping-info">
                    <hr>
                    <p>Shipping Information: </p>
                    <hr>

                    <div class="form-field">
                        <input class="form-control" type="text" name="address" placeholder="Address..">
                    </div>
                    <div class="form-field">
                        <input class="form-control" type="text" name="address" placeholder="City..">
                    </div>
                    <div class="form-field">
                        <input class="form-control" type="text" name="address" placeholder="ZIP..">
                    </div>

                </div>
                <hr>
                <input id="form-button" class="btn btn-success btn-block" type="submit" value="Continue">
            </form>
        </div>
        <br>
        <div class="box-element hidden" id="payment-info">
            <small>Razorpay</small>
            <div id="paypal-button-container"></div>
        </div>
    </div>

    <div class="col-lg-6">
        <div class="box-element" id="form-wrapper"> </div>
    </div>
</div>

{% endblock content %}
